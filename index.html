<!DOCTYPE html>
<html lang="pt=br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Simulador de Autonomia</title>
   <link rel="stylesheet" href="/css/style.css">
   <script src="js/script.js"></script>
</head>
<body>
   <header><h1>SIMULADOR DE AUTONOMIA</h1></header>
   <main>
      <div id="visor-conteiner">
         <div id="bateria-inicial">
            <div id="nivel-bateria"></div>
         </div>
         <p id="porcentagem-inicial"></p>
         <p id="tempo-restante"></p>
      </div>
      <div id="painel-consumo-conteiner">
         <h2>Painel de Consumo:</h2>
         <div id="controles-conteiner">
            <input type="checkbox" name="wifi" id="wifi">
            <label for="wifi">Wi-Fi Ativo</label>

            <input type="checkbox" name="jogo" id="jogo">
            <label for="jogo">🎮 Modo Jogo (Alta Perf.)</label>

            <div id="range-conteiner">
               <label for="brilho">☀️ Brilho Máximo</label>
               <input type="range" name="brilho" id="brilho" min="0" max="100">
               <span>100%</span>
            </div>
         </div>
      </div>
      <p id="info"></p>
   </main>
</body>
</html>
